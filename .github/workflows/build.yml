name: build
on:
  push:
    branches: [main]
  workflow_dispatch: {}
permissions:
  contents: read
  packages: write
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true
jobs:
  # Each architecture builds on its native runner and pushes by digest; the
  # merge jobs stitch the digests into one multi-arch tag. No QEMU anywhere.
  base:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Test the base image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/base/Dockerfile
          target: test
          platforms: ${{ matrix.platform }}
          outputs: type=cacheonly
          cache-from: type=gha,scope=base-${{ matrix.arch }}
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/base/Dockerfile
          target: production
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/clorhq/software-development-base,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=base-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=base-${{ matrix.arch }}
      - name: Export digest
        run: |
          mkdir --parents /tmp/digests
          DIGEST="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${DIGEST#sha256:}"
      - uses: actions/upload-artifact@v4
        with:
          name: digests-base-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1
  merge-base:
    needs: base
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-base-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create the multi-arch tag
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/clorhq/software-development-base:latest \
            $(printf 'ghcr.io/clorhq/software-development-base@sha256:%s ' *)
          docker buildx imagetools inspect ghcr.io/clorhq/software-development-base:latest
  variants:
    needs: merge-base
    strategy:
      fail-fast: false
      matrix:
        image: [rust, go, typescript, python, zig, ruby, desktop]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/${{ matrix.image }}/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: BASE_IMAGE=ghcr.io/clorhq/software-development-base:latest
          outputs: type=image,name=ghcr.io/clorhq/software-development-${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}
      - name: Export digest
        run: |
          mkdir --parents /tmp/digests
          DIGEST="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${DIGEST#sha256:}"
      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1
  merge-variants:
    needs: variants
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [rust, go, typescript, python, zig, ruby, desktop]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.image }}-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create the multi-arch tag
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/clorhq/software-development-${{ matrix.image }}:latest \
            $(printf 'ghcr.io/clorhq/software-development-${{ matrix.image }}@sha256:%s ' *)
